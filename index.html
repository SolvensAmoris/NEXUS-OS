<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS OS | Business Copilot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Dependencia Cloud -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0B0F19; color: #E2E8F0; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(16, 185, 129, 0.2); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <header class="p-4 glass-panel flex justify-between items-center z-10 border-b border-emerald-900/30">
        <h1 class="text-xl font-black text-emerald-400 tracking-tighter">NEXUS OS</h1>
        <div class="flex items-center gap-3">
            <div class="text-right">
                <span class="text-slate-500 text-[9px] block uppercase">Flujo Caja</span>
                <span class="font-bold text-amber-400 text-sm" id="cash-flow">$0.00</span>
            </div>
            <button onclick="StorageManager.exportarCSV()" class="text-[10px] bg-slate-800 px-2 py-1 rounded text-emerald-400 border border-emerald-900 hover:bg-emerald-900 transition-all">↓ CSV</button>
        </div>
    </header>

    <div id="report-panel" class="px-4 py-3">
        <div class="glass-panel p-3 rounded-2xl">
            <canvas id="myChart" height="70"></canvas>
        </div>
    </div>

    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 flex flex-col pb-24"></main>

    <footer class="fixed bottom-0 w-full p-4 bg-[#0B0F19] border-t border-emerald-900/30">
        <form id="nexus-form" class="flex gap-2">
            <input type="text" id="user-input" autocomplete="off" placeholder="Ej: Venta 500..." class="flex-1 bg-slate-900 border border-slate-700 text-white text-sm rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500">
            <button type="submit" class="bg-emerald-600 text-white rounded-xl px-4 py-3 hover:bg-emerald-500 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>
            </button>
        </form>
    </footer>

    <script src="/storage/storage.js"></script>
    <script src="/storage/cloud.js"></script>
    <script src="/agents/agent.js"></script>
    <script src="/app.js"></script>
</body>
</html>
