<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS OS | Copilot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0B0F19; color: #E2E8F0; }
        .nexus-glow { text-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(16, 185, 129, 0.2); }
        /* Hide scrollbar for clean UI */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="p-4 glass-panel flex justify-between items-center z-10">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-full bg-emerald-400 animate-pulse"></div>
            <h1 class="text-xl font-semibold tracking-wider text-emerald-400 nexus-glow">NEXUS OS</h1>
        </div>
        <div class="text-xs text-emerald-200/50">V 1.0.0</div>
    </header>

    <!-- Context Engine Dashboard (Mini) -->
    <div class="px-4 py-3 bg-slate-900 border-b border-emerald-900/30 flex justify-between text-sm">
        <div>
            <span class="text-slate-400 block text-xs">Flujo de Caja</span>
            <span class="font-bold text-amber-400" id="cash-flow">$0.00 MXN</span>
        </div>
        <div class="text-right">
            <span class="text-slate-400 block text-xs">Estado del Sistema</span>
            <span class="font-bold text-emerald-500">Activo</span>
        </div>
    </div>

    <!-- Copilot UI (Chat Interface) -->
    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 flex flex-col pb-24">
        <!-- Initial Message -->
        <div class="flex gap-3">
            <div class="w-8 h-8 rounded border border-emerald-500 bg-slate-800 flex items-center justify-center text-emerald-400 font-bold shrink-0">N</div>
            <div class="glass-panel p-3 rounded-2xl rounded-tl-none text-sm leading-relaxed max-w-[85%]">
                Sistema en línea. Procesamiento contable y operativo listo. ¿Qué movimiento de negocio registramos hoy?
            </div>
        </div>
    </main>

    <!-- Automation Engine (Input Area) -->
    <footer class="fixed bottom-0 w-full p-4 bg-[#0B0F19] border-t border-emerald-900/30">
        <form id="nexus-form" class="flex gap-2">
            <input type="text" id="user-input" autocomplete="off" placeholder="Ej: Registra una venta de $1500..." 
                class="flex-1 bg-slate-800 border border-slate-700 text-white text-sm rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500 transition-colors">
            <button type="submit" class="bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl px-4 py-3 font-semibold transition-colors flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                </svg>
            </button>
        </form>
    </footer>

    <script>
        // NEXUS CORE LOGIC (MVP V1)
        const Códice = {
            memoria: JSON.parse(localStorage.getItem('nexus_codice')) || { caja: 0, transacciones: [] },
            guardar: function() {
                localStorage.setItem('nexus_codice', JSON.stringify(this.memoria));
                actualizarUI();
            }
        };

        const chatContainer = document.getElementById('chat-container');
        const form = document.getElementById('nexus-form');
        const input = document.getElementById('user-input');
        const cashFlowDisplay = document.getElementById('cash-flow');

        function actualizarUI() {
            cashFlowDisplay.textContent = `$${Códice.memoria.caja.toLocaleString('es-MX')} MXN`;
        }

        function agregarMensaje(texto, esUsuario = false) {
            const div = document.createElement('div');
            div.className = `flex gap-3 ${esUsuario ? 'flex-row-reverse' : ''}`;
            
            const avatar = esUsuario 
                ? `<div class="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-slate-300 text-xs shrink-0 border border-slate-600">Tú</div>`
                : `<div class="w-8 h-8 rounded border border-emerald-500 bg-slate-800 flex items-center justify-center text-emerald-400 font-bold shrink-0">N</div>`;
            
            const burbujaEstilo = esUsuario
                ? `bg-slate-800 border border-slate-700 p-3 rounded-2xl rounded-tr-none text-sm text-slate-200 max-w-[85%]`
                : `glass-panel p-3 rounded-2xl rounded-tl-none text-sm leading-relaxed max-w-[85%] text-emerald-50`;

            div.innerHTML = `
                ${avatar}
                <div class="${burbujaEstilo}">${texto}</div>
            `;
            
            chatContainer.appendChild(div);
            window.scrollTo(0, document.body.scrollHeight);
        }

        // Simulación de Context Engine & Nexus Core
        function procesarInput(texto) {
            const comando = texto.toLowerCase();
            let respuesta = "";

            if (comando.includes('venta') || comando.includes('ingreso')) {
                const monto = extraerMonto(comando);
                if (monto) {
                    Códice.memoria.caja += monto;
                    Códice.memoria.transacciones.push({ tipo: 'ingreso', monto, fecha: new Date() });
                    respuesta = `Venta registrada. He añadido $${monto} MXN a tu flujo de caja. Base de datos contable actualizada.`;
                } else {
                    respuesta = "Entendido, es un ingreso. Por favor, indícame el monto exacto para actualizar el sistema.";
                }
            } 
            else if (comando.includes('gasto') || comando.includes('compra')) {
                const monto = extraerMonto(comando);
                if (monto) {
                    Códice.memoria.caja -= monto;
                    Códice.memoria.transacciones.push({ tipo: 'egreso', monto, fecha: new Date() });
                    respuesta = `Gasto procesado. He descontado $${monto} MXN. El Códice ha guardado el movimiento.`;
                } else {
                    respuesta = "¿De cuánto fue el gasto? Necesito la cifra para mantener la conciliación exacta.";
                }
            }
            else if (comando.includes('resumen') || comando.includes('reporte')) {
                respuesta = `Tu flujo de caja actual es de $${Códice.memoria.caja} MXN. Tienes ${Códice.memoria.transacciones.length} transacciones registradas en memoria.`;
            }
            else {
                respuesta = "Comando recibido en el Códice. Actualmente opero con lógica de ingresos/gastos. Para procesarlo, menciona 'venta' o 'gasto' con un monto numérico.";
            }

            Códice.guardar();
            setTimeout(() => agregarMensaje(respuesta, false), 600);
        }

        function extraerMonto(texto) {
            const numeros = texto.match(/\d+/);
            return numeros ? parseInt(numeros[0]) : null;
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const texto = input.value.trim();
            if (!texto) return;
            
            agregarMensaje(texto, true);
            input.value = '';
            procesarInput(texto);
        });

        // Init
        actualizarUI();
    </script>
</body>
</html>
