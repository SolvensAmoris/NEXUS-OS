<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Core - México</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app" class="grimorio-container">
        <header>
            <h1>NEXUS OS OMEGA</h1>
            <p class="subtitle">Núcleo de Operaciones Localizado (MXN)</p>
        </header>

        <main>
            <section id="auth-section" class="card">
                <h2>Portal de Acceso</h2>
                <input type="email" id="email" placeholder="Correo electrónico">
                <input type="password" id="password" placeholder="Contraseña">
                <div class="actions">
                    <button onclick="core.login()">Transmutar Entrada</button>
                    <button onclick="core.register()">Registrar Grimorio</button>
                </div>
            </section>

            <section id="dashboard-section" class="card hidden">
                <h2>Panel de Control</h2>
                <p>Bienvenido: <span id="user-display"></span></p>
                <button onclick="core.logout()" class="btn-danger">Cerrar Portal</button>
            </section>

            <section id="premium-section" class="card hidden" style="border-color: var(--accent-gold); margin-top: 20px;">
                <h2>Núcleo Clasificado</h2>
                <p>Estado: <span id="status-display">...</span></p>
                <div id="premium-content" class="hidden">
                    <p>Acceso concedido al círculo interno.</p>
                    <button id="btn-portal" onclick="core.gestionarPortal()" style="background: #2563eb;">Gestionar Alianza</button>
                </div>
                <button id="btn-pay" onclick="core.iniciarPago()" class="hidden">Forjar Alianza (Pagar)</button>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
