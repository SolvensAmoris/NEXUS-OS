<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS OS | Business Copilot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0B0F19; color: #E2E8F0; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(16, 185, 129, 0.2); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <header class="p-4 glass-panel flex justify-between items-center z-10 border-b border-emerald-900/30">
        <h1 class="text-xl font-black text-emerald-400 tracking-tighter">NEXUS OS</h1>
        <div class="flex items-center gap-3">
            <div class="text-right">
                <span class="text-slate-500 text-[9px] block uppercase">Flujo Caja</span>
                <span class="font-bold text-amber-400 text-sm" id="cash-flow">$0.00</span>
            </div>
        </div>
    </header>

    <div id="report-panel" class="px-4 py-3 overflow-y-auto">
        <div class="glass-panel p-3 rounded-2xl">
            <canvas id="myChart" height="70"></canvas>
        </div>
        <div id="upgrade-banner" class="mt-4 p-4 bg-emerald-900/20 border border-emerald-500 rounded-xl text-center">
            <p class="text-xs text-emerald-400 font-bold uppercase tracking-widest">¿Quieres reportes detallados?</p>
            <p class="text-[10px] text-slate-400 mt-1">Desbloquea análisis anual y exportación premium.</p>
            <button class="mt-2 bg-emerald-600 w-full py-2 rounded-lg text-[11px] font-bold text-white">ACTUALIZAR A PRO - $99 MXN</button>
        </div>
    </div>

    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 flex flex-col pb-32"></main>

    <footer class="fixed bottom-0 w-full p-4 bg-[#0B0F19] border-t border-emerald-900/30">
        <form id="nexus-form" class="flex gap-2 mb-4">
            <input type="text" id="user-input" autocomplete="off" placeholder="Ej: Venta 500 a Juan..." class="flex-1 bg-slate-900 border border-slate-700 text-white text-sm rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500">
            <button type="submit" class="bg-emerald-600 text-white rounded-xl px-4 py-3 hover:bg-emerald-500 transition-all">Enviar</button>
        </form>
    </footer>

    <script src="storage/cloud.js"></script>
    <script src="agents/agent.js"></script>
    <script src="app.js"></script>
</body>
</html>
